<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國軍退休俸計算機 (107年新制)</title>
    
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 載入 React, ReactDOM 與 Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 圖示元件 (取代原來的 lucide-react，確保單一檔案能直接執行) ---
        const IconCalculator = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16.01" y1="10" y2="10"/><line x1="16" x2="16.01" y1="14" y2="14"/><line x1="16" x2="16.01" y1="18" y2="18"/><line x1="8" x2="8.01" y1="10" y2="10"/><line x1="12" x2="12.01" y1="10" y2="10"/><line x1="8" x2="8.01" y1="14" y2="14"/><line x1="12" x2="12.01" y1="14" y2="14"/><line x1="8" x2="8.01" y1="18" y2="18"/><line x1="12" x2="12.01" y1="18" y2="18"/>
            </svg>
        );
        const IconMedal = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M7.21 15 2.66 7.14a2 2 0 0 1 .13-2.2L4.4 2.8A2 2 0 0 1 6 2h12a2 2 0 0 1 1.6.8l1.6 2.14a2 2 0 0 1 .14 2.2L16.79 15"/><path d="M11 12 5.12 2.2"/><path d="m13 12 5.88-9.8"/><path d="M8 7h8"/><circle cx="12" cy="17" r="5"/><polyline points="12 18 10.5 14 12 16 13.5 14 12 18"/>
            </svg>
        );
        const IconCalendar = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/>
            </svg>
        );
        const IconInfo = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>
            </svg>
        );
        const IconAlertCircle = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>
            </svg>
        );
        const IconTrendingUp = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>
            </svg>
        );
        const IconDollarSign = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
        );

        // --- 核心資料 ---
        const salaryData = {
          '軍官': {
            '中將': [53390, 54930, 56460, 57990, 59520, 63570],
            '少將': [46500, 48030, 49560, 51100, 52630, 54160, 55690, 57220, 58760, 60290],
            '上校': [41900, 43440, 44970, 46500, 48030, 49560, 51100, 52630, 54160, 55690, 57220, 58760],
            '中校': [37310, 38460, 39610, 40760, 41900, 43050, 44200, 45350, 46500, 47650, 48800, 49950],
            '少校': [32710, 33860, 35010, 36160, 37310, 38460, 39610, 40760, 41900, 43050, 44200, 45350],
            '上尉': [28880, 30030, 31180, 32330, 33480, 34630, 35780, 36930, 38070, 39220, 40370, 41520],
            '中尉': [25050, 25820, 26580, 27350, 28120, 28880, 29650, 30410, 31180, 31950],
            '少尉': [22750, 23520, 24290, 25050, 25820, 26580, 27350, 28120, 28880, 29650, 30410, 31180]
          },
          '士官': {
            '一等士官長': [28880, 29650, 30410, 31180, 31950, 32710, 33480, 34240, 35010, 35780, 36540, 37310, 38070, 38840, 39610, 40370, 41140, 41900, 42670, 43440],
            '二等士官長': [25050, 25820, 26580, 27350, 28120, 28880, 29650, 30410, 31180, 31950, 32710, 33480, 34240, 35010, 35780, 36540, 37310, 38070, 38840, 39610],
            '三等士官長': [22750, 23520, 24290, 25050, 25820, 26580, 27350, 28120, 28880, 29650, 30410, 31180, 31950, 32710, 33480, 34240, 35010, 35780, 36540, 37310],
            '上士': [21220, 21990, 22750, 23520, 24290, 25050, 25820, 26580, 27350, 28120, 28880, 29650],
            '中士': [17390, 18160, 18920, 19690, 20460, 21220, 21990, 22750, 23520, 24290, 25050, 25820],
            '下士': [13380, 13920, 14460, 15000, 15540, 16090, 16630, 17390, 18160, 18920, 19690, 20460]
          }
        };

        function App() {
          const [officerType, setOfficerType] = useState('軍官');
          const [rank, setRank] = useState('少校');
          const [currentGrade, setCurrentGrade] = useState(1);
          const [commissionDate, setCommissionDate] = useState('2004-01-01');
          const [promotionDate, setPromotionDate] = useState('2022-01-01');
          const [retirementDate, setRetirementDate] = useState('2026-01-01');

          const [results, setResults] = useState({
            years: 0,
            months: 0,
            finalGrade: 1,
            finalBaseSalary: 0,
            averageBaseSalary: 0,
            monthsToAverage: 0,
            rate: '0.00',
            monthly: 0,
            isEligible: false
          });

          const handleOfficerTypeChange = (newType) => {
            setOfficerType(newType);
            setRank(newType === '軍官' ? '少校' : '一等士官長');
            setCurrentGrade(1);
          };

          useEffect(() => {
            if (!commissionDate || !promotionDate || !retirementDate) return;
            
            const rankData = salaryData[officerType]?.[rank];
            if (!rankData) return;

            const commDate = new Date(commissionDate);
            const promDate = new Date(promotionDate);
            const retDate = new Date(retirementDate);

            if (retDate < commDate) {
              setResults(prev => ({ ...prev, isEligible: false, monthly: 0 }));
              return;
            }

            let totalMonths = (retDate.getFullYear() - commDate.getFullYear()) * 12 + (retDate.getMonth() - commDate.getMonth());
            if (retDate.getDate() < commDate.getDate()) {
              totalMonths -= 1;
            }
            const years = Math.floor(totalMonths / 12);
            const months = totalMonths % 12;

            const maxGradeLevel = rankData.length;

            let finalGradeIncrements = retDate.getFullYear() - promDate.getFullYear();
            if (retDate.getMonth() < promDate.getMonth() || (retDate.getMonth() === promDate.getMonth() && retDate.getDate() < promDate.getDate())) {
              finalGradeIncrements -= 1;
            }
            const finalGrade = Math.max(1, Math.min(Number(currentGrade) + finalGradeIncrements, maxGradeLevel));
            const finalBaseSalary = rankData[finalGrade - 1] || 0;

            const monthsToAverage = Math.floor(totalMonths / 5);
            let totalSalarySum = 0;

            if (monthsToAverage > 0) {
              for (let i = 0; i < monthsToAverage; i++) {
                let d = new Date(retDate.getFullYear(), retDate.getMonth() - i, retDate.getDate());
                let yearsDiff = d.getFullYear() - promDate.getFullYear();
                if (d.getMonth() < promDate.getMonth() || (d.getMonth() === promDate.getMonth() && d.getDate() < promDate.getDate())) {
                  yearsDiff--;
                }
                let gradeAtMonth = Math.max(1, Math.min(Number(currentGrade) + yearsDiff, maxGradeLevel));
                totalSalarySum += rankData[gradeAtMonth - 1] || 0;
              }
            }
            
            const averageBaseSalary = monthsToAverage > 0 ? Math.round(totalSalarySum / monthsToAverage) : 0;

            let rate = 0;
            let isEligible = false;

            if (totalMonths >= 240) {
              isEligible = true;
              rate = 55 + (totalMonths - 240) * (2 / 12);
              const maxRate = officerType === '軍官' ? 90 : 95;
              rate = Math.min(rate, maxRate);
            }

            const monthly = isEligible ? Math.round(averageBaseSalary * 2 * (rate / 100)) : 0;

            setResults({
              years, months, finalGrade, finalBaseSalary, averageBaseSalary, monthsToAverage,
              rate: rate.toFixed(2), monthly, isEligible
            });

          }, [officerType, rank, currentGrade, commissionDate, promotionDate, retirementDate]);

          const maxGradesForCurrentRank = salaryData[officerType][rank]?.length || 12;

          return (
            <div className="min-h-screen bg-slate-50 p-4 md:p-8 text-slate-800 pb-20">
              <div className="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
                
                <div className="bg-emerald-800 text-white p-6 md:p-8 flex items-center gap-4 relative overflow-hidden">
                  <div className="absolute -right-10 -top-10 opacity-10">
                    <IconCalculator className="w-48 h-48" />
                  </div>
                  <IconCalculator className="w-10 h-10 text-emerald-200 z-10 shrink-0" />
                  <div className="z-10">
                    <div className="flex flex-wrap items-center gap-2">
                      <h1 className="text-2xl md:text-3xl font-bold">國軍退休俸計算機</h1>
                      <span className="bg-emerald-600 text-white text-xs px-2 py-1 rounded-md font-medium border border-emerald-500 whitespace-nowrap">107年新制</span>
                    </div>
                    <p className="text-emerald-100 mt-1 text-sm md:text-base">依照最後 1/5 年資之本俸平均數計算</p>
                  </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-0 divide-y lg:divide-y-0 lg:divide-x divide-slate-200">
                  
                  <div className="p-6 md:p-8 space-y-6 bg-white">
                    <h2 className="text-xl font-bold flex items-center gap-2 text-emerald-800 border-b border-emerald-100 pb-2">
                      <IconMedal className="w-5 h-5" /> 基本資料填寫
                    </h2>
                    
                    <div className="space-y-2">
                      <label className="block text-sm font-medium text-slate-600">身分別</label>
                      <div className="flex gap-4">
                        {['軍官', '士官'].map(type => (
                          <label key={type} className="flex items-center gap-2 cursor-pointer p-2 border rounded-lg hover:bg-slate-50">
                            <input 
                              type="radio" 
                              name="officerType" 
                              value={type} 
                              checked={officerType === type}
                              onChange={(e) => handleOfficerTypeChange(e.target.value)}
                              className="w-4 h-4 text-emerald-600 focus:ring-emerald-500 border-slate-300"
                            />
                            <span className="text-slate-700 font-medium">{type}</span>
                          </label>
                        ))}
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                      <div className="space-y-2">
                        <label className="block text-sm font-medium text-slate-600">目前階級</label>
                        <select 
                          value={rank}
                          onChange={(e) => setRank(e.target.value)}
                          className="w-full rounded-lg border-slate-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500 p-2.5 border bg-white"
                        >
                          {Object.keys(salaryData[officerType]).map(r => (
                            <option key={r} value={r}>{r}</option>
                          ))}
                        </select>
                      </div>

                      <div className="space-y-2">
                        <label className="block text-sm font-medium text-slate-600">目前薪級</label>
                        <select 
                          value={currentGrade}
                          onChange={(e) => setCurrentGrade(e.target.value)}
                          className="w-full rounded-lg border-slate-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500 p-2.5 border bg-white"
                        >
                          {Array.from({ length: maxGradesForCurrentRank }, (_, i) => i + 1).map(g => (
                            <option key={g} value={g}>{g} 級</option>
                          ))}
                        </select>
                      </div>
                    </div>

                    <div className="space-y-4 pt-4 border-t border-slate-100">
                      <div className="space-y-2">
                        <label className="block text-sm font-medium text-slate-600">任官日期 (計算年資)</label>
                        <div className="relative">
                          <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <IconCalendar className="h-5 w-5 text-slate-400" />
                          </div>
                          <input 
                            type="date" 
                            value={commissionDate}
                            onChange={(e) => setCommissionDate(e.target.value)}
                            className="w-full pl-10 rounded-lg border-slate-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500 p-2.5 border text-base"
                          />
                        </div>
                      </div>

                      <div className="space-y-2">
                        <label className="block text-sm font-medium text-slate-600">最近一次晉支日期 (推算升級)</label>
                        <div className="relative">
                          <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <IconCalendar className="h-5 w-5 text-slate-400" />
                          </div>
                          <input 
                            type="date" 
                            value={promotionDate}
                            onChange={(e) => setPromotionDate(e.target.value)}
                            className="w-full pl-10 rounded-lg border-slate-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500 p-2.5 border text-base"
                          />
                        </div>
                      </div>

                      <div className="space-y-2">
                        <label className="block text-sm font-medium text-slate-600">預計退伍日期</label>
                        <div className="relative">
                          <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <IconCalendar className="h-5 w-5 text-slate-400" />
                          </div>
                          <input 
                            type="date" 
                            value={retirementDate}
                            onChange={(e) => setRetirementDate(e.target.value)}
                            className="w-full pl-10 rounded-lg border-slate-300 shadow-sm focus:border-emerald-500 focus:ring-emerald-500 p-2.5 border text-base"
                          />
                        </div>
                      </div>
                    </div>
                    
                    <div className="bg-emerald-50 border border-emerald-100 p-4 rounded-xl text-sm text-emerald-800 flex items-start gap-3">
                      <IconInfo className="w-5 h-5 shrink-0 mt-0.5" />
                      <p>系統將依照您設定的日期，自動往前推算最後 1/5 年資期間的各月薪級變化，並計算出本俸平均值。</p>
                    </div>
                  </div>

                  <div className="p-6 md:p-8 bg-slate-50 flex flex-col justify-center">
                    
                    {!results.isEligible && (results.years > 0 || results.months > 0) && (
                      <div className="mb-6 bg-rose-50 border border-rose-200 text-rose-800 p-4 rounded-xl flex items-start gap-3 shadow-sm">
                        <IconAlertCircle className="w-6 h-6 shrink-0 mt-0.5" />
                        <div>
                          <h4 className="font-bold">未達終身俸資格</h4>
                          <p className="text-sm mt-1">服役年資未滿 20 年，不具備支領月退休俸資格（僅能支領一次退伍金）。</p>
                        </div>
                      </div>
                    )}

                    <div className="space-y-5">
                      <div className="grid grid-cols-2 gap-4">
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                          <div className="text-sm text-slate-500 mb-1">採計服役年資</div>
                          <div className="text-xl font-bold text-slate-800">
                            {results.years} <span className="text-base font-normal">年</span> {results.months} <span className="text-base font-normal">個月</span>
                          </div>
                        </div>
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                          <div className="text-sm text-slate-500 mb-1">核定退休俸率</div>
                          <div className="text-xl font-bold text-emerald-600">
                            {results.rate}%
                            {results.rate === (officerType === '軍官' ? '90.00' : '95.00') && (
                              <div className="mt-1"><span className="text-xs bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded-full">已達上限</span></div>
                            )}
                          </div>
                        </div>
                      </div>

                      <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-4 opacity-5">
                          <IconTrendingUp className="w-16 h-16" />
                        </div>
                        <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-3 gap-2">
                          <div className="text-sm text-slate-500 font-medium">最後 1/5 年資平均本俸</div>
                          <div className="text-xs bg-slate-100 text-slate-600 px-2 py-1 rounded w-fit">
                            採計最後 {results.monthsToAverage} 個月
                          </div>
                        </div>
                        <div className="text-2xl font-bold text-slate-800 mb-1">
                          ${results.averageBaseSalary.toLocaleString()}
                        </div>
                        <div className="text-sm text-slate-400">
                          註：退伍時最後在職本俸估算為 ${results.finalBaseSalary.toLocaleString()} ({rank} {results.finalGrade}級)
                        </div>
                      </div>

                      <div className="bg-gradient-to-br from-emerald-800 to-emerald-600 p-6 rounded-2xl shadow-lg text-white text-center">
                        <div className="text-emerald-100 text-sm font-medium mb-2 flex items-center justify-center gap-2">
                          <IconDollarSign className="w-4 h-4" /> 估算月退休俸額
                        </div>
                        <div className="text-4xl md:text-5xl font-bold tracking-tight">
                          <span className="text-2xl mr-1">$</span>
                          {results.monthly.toLocaleString()}
                        </div>
                        <div className="mt-4 text-xs text-emerald-100 bg-emerald-900/30 py-2 px-4 rounded-lg inline-block border border-emerald-500/30">
                          公式：平均本俸 × 2 × 俸率 ({results.rate}%)
                        </div>
                      </div>
                    </div>

                  </div>
                </div>
              </div>
              <div className="text-center mt-6 text-sm text-slate-400">
                僅供參考，實際退撫給與以國防部及主管機關核定為準。
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
